<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n8n Chat</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1115;
    color: #e6e6e6;
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .app {
    width: 420px;
    height: 640px;
    background: #1a1d24;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .header {
    padding: 16px 20px;
    background: #20232c;
    border-bottom: 1px solid #2a2e38;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #555;
  }
  .header .dot.online { background: #3ecf6e; }
  .header h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
  }
  .header .sub {
    font-size: 12px;
    color: #888;
    margin-left: auto;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #3a6df0;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: #2a2e38;
    color: #e6e6e6;
    border-bottom-left-radius: 4px;
  }
  .msg.error {
    align-self: flex-start;
    background: #3a1f24;
    color: #ff8a8a;
    border: 1px solid #5c2a30;
    font-size: 13px;
  }
  .msg.typing {
    align-self: flex-start;
    background: #2a2e38;
    color: #888;
    font-style: italic;
  }
  .input-bar {
    display: flex;
    gap: 8px;
    padding: 14px;
    background: #20232c;
    border-top: 1px solid #2a2e38;
  }
  .input-bar input {
    flex: 1;
    background: #14161b;
    border: 1px solid #2a2e38;
    color: #e6e6e6;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 14px;
    outline: none;
  }
  .input-bar input:focus {
    border-color: #3a6df0;
  }
  .input-bar button {
    background: #3a6df0;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .input-bar button:disabled {
    background: #2a2e38;
    color: #666;
    cursor: not-allowed;
  }
  .config {
    padding: 10px 16px;
    background: #14161b;
    border-bottom: 1px solid #2a2e38;
    font-size: 12px;
    color: #888;
  }
  .config input {
    width: 100%;
    background: #1a1d24;
    border: 1px solid #2a2e38;
    color: #ccc;
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 12px;
    margin-top: 4px;
    outline: none;
  }
  .config input:focus { border-color: #3a6df0; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="dot" id="statusDot"></div>
    <h1>n8n Chat (вместо Telegram)</h1>
    <span class="sub">локально</span>
  </div>

  <div class="config">
    Webhook URL n8n:
    <input type="text" id="webhookUrl" value="http://localhost:5678/webhook/chat" />
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">Привет! Это локальный чат вместо Telegram-бота. Сообщения уходят прямо в твой n8n workflow через Webhook node. Напиши что-нибудь.</div>
  </div>

  <div class="input-bar">
    <input type="text" id="input" placeholder="Напишите сообщение..." />
    <button id="sendBtn">Отправить</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const webhookUrlEl = document.getElementById('webhookUrl');
const statusDot = document.getElementById('statusDot');

function addMessage(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  const url = webhookUrlEl.value.trim();
  if (!url) {
    addMessage('Укажите webhook URL выше.', 'error');
    return;
  }

  addMessage(text, 'user');
  inputEl.value = '';
  sendBtn.disabled = true;

  const typingEl = addMessage('бот печатает...', 'typing');

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        chatId: 'local-test-user',
        timestamp: new Date().toISOString()
      })
    });

    typingEl.remove();

    if (!response.ok) {
      addMessage('Ошибка сервера: ' + response.status + ' ' + response.statusText, 'error');
      statusDot.classList.remove('online');
      return;
    }

    statusDot.classList.add('online');

    let data;
    const contentType = response.headers.get('content-type') || '';
    if (contentType.includes('application/json')) {
      data = await response.json();
    } else {
      data = { reply: await response.text() };
    }

    // Пытаемся достать ответ из самых типичных полей,
    // которые отдаёт n8n Respond to Webhook node
    const reply =
      data.reply ??
      data.message ??
      data.text ??
      data.output ??
      (Array.isArray(data) && data[0] && (data[0].reply || data[0].message || data[0].text)) ??
      JSON.stringify(data);

    addMessage(String(reply), 'bot');

  } catch (err) {
    typingEl.remove();
    statusDot.classList.remove('online');
    addMessage(
      'Не удалось связаться с n8n: ' + err.message +
      '\n\nПроверьте: запущен ли n8n, активирован ли workflow, верный ли URL (test-URL работает только при открытой вкладке "Listen for test event" в n8n, обычный URL — после Activate).',
      'error'
    );
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});

inputEl.focus();
</script>

</body>
</html>
